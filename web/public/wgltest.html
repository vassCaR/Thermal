<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>WebGL animation test</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#fff;font-family:monospace}
  #c{display:block;width:100vw;height:60vh}
  #info{padding:16px;font-size:16px;line-height:1.6}
  .big{font-size:28px;font-weight:bold}
  .ok{color:#3cff6a}.bad{color:#ff4242}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">démarrage…</div>
<script>
(function(){
  var canvas = document.getElementById('c');
  var info = document.getElementById('info');
  var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if(!gl){ info.innerHTML = '<span class="bad big">PAS DE WEBGL DU TOUT</span>'; return; }
  canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;

  function mkShader(type, src){
    var s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
      info.innerHTML = '<span class="bad">ERREUR SHADER: '+gl.getShaderInfoLog(s)+'</span>';
    }
    return s;
  }
  var vsrc = 'attribute vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }';
  var fsrc = [
    'precision highp float;',
    'uniform float t;',
    'uniform vec2 r;',
    'void main(){',
    '  vec2 uv = gl_FragCoord.xy / r;',
    '  float v = 0.5 + 0.5 * sin(t * 3.0 + uv.x * 10.0 + uv.y * 6.0);',
    '  gl_FragColor = vec4(0.5 + 0.5*sin(t*2.3), v, 0.5 + 0.5*sin(t*1.7+2.0), 1.0);',
    '}'
  ].join('\n');

  var prog = gl.createProgram();
  gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, vsrc));
  gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(prog); gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  var loc = gl.getAttribLocation(prog, 'p');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  var ut = gl.getUniformLocation(prog, 't');
  var ur = gl.getUniformLocation(prog, 'r');

  var renderer = 'inconnu';
  var dbg = gl.getExtension('WEBGL_debug_renderer_info');
  if(dbg) renderer = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);

  var frames = 0, start = performance.now(), lastReport = start;
  function frame(){
    frames++;
    var now = performance.now();
    var t = (now - start) / 1000;
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.uniform1f(ut, t);
    gl.uniform2f(ur, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLES, 0, 3);

    if(now - lastReport > 500){
      var fps = Math.round(frames / ((now - start)/1000));
      var verdict = fps > 5
        ? '<span class="ok big">ANIME — '+fps+' fps</span>'
        : '<span class="bad big">FIGE — '+fps+' fps</span>';
      info.innerHTML = verdict +
        '<br>Si le rectangle du haut change de couleur => WebGL anime bien.' +
        '<br>Si le rectangle est FIXE alors que fps &gt; 5 => bug de compositing navigateur.' +
        '<br>GPU: ' + renderer;
      lastReport = now;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
